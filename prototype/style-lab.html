<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>晨雾未醒 · 风格实验室</title>
<style>
  :root{
    --panel-bg: rgba(10, 18, 16, .72);
    --panel-line: rgba(255,255,255,.14);
    --panel-ink: #E8F1EC;
    --panel-dim: rgba(232,241,236,.55);
    --serif: "Songti SC","STSong","Source Han Serif SC","Noto Serif SC",Georgia,serif;
    --sans: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    --mono: "SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  #stage{ position:fixed; inset:0; display:block; touch-action:none; cursor:crosshair; }

  /* ---------- overlays ---------- */
  #flash{ position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:30; }
  #title{
    position:fixed; left:0; right:0; top:16%; text-align:center; z-index:20;
    pointer-events:none; opacity:0; transition:opacity 2.4s ease;
  }
  #title .cn{ font-family:var(--serif); font-weight:500; font-size:clamp(1.6rem,6vw,2.6rem);
    letter-spacing:.42em; text-indent:.42em; color:#fff; text-shadow:0 0 24px rgba(255,255,255,.35); }
  #title .en{ display:block; margin-top:14px; font-family:var(--serif); font-style:italic;
    font-size:clamp(.7rem,2.4vw,.95rem); letter-spacing:.3em; color:rgba(255,255,255,.72); }
  #title .tag{ display:block; margin-top:18px; font-family:var(--serif);
    font-size:clamp(.68rem,2.2vw,.85rem); letter-spacing:.18em; color:rgba(255,255,255,.5); }

  .whisper{
    position:fixed; z-index:20; pointer-events:none; transform:translate(-50%,-100%);
    font-family:var(--serif); font-size:.85rem; letter-spacing:.14em; color:rgba(255,255,255,.85);
    text-shadow:0 1px 12px rgba(0,0,0,.5); opacity:0; transition:opacity 1.2s ease;
  }
  #hint{
    position:fixed; left:0; right:0; bottom:calc(24px + env(safe-area-inset-bottom)); text-align:center; z-index:20;
    pointer-events:none; font-family:var(--serif); font-size:.78rem; letter-spacing:.3em; text-indent:.3em;
    color:rgba(255,255,255,.55); text-shadow:0 1px 8px rgba(0,0,0,.4);
    opacity:0; transition:opacity 1.6s ease;
  }
  #skip{
    position:fixed; left:0; right:0; bottom:calc(28px + env(safe-area-inset-bottom)); text-align:center; z-index:31;
    pointer-events:none; font-family:var(--serif); font-size:.75rem; letter-spacing:.34em; text-indent:.34em;
    color:rgba(255,255,255,.45); opacity:0; transition:opacity 1s ease;
  }
  #toast{
    position:fixed; left:50%; bottom:calc(100px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(8px);
    z-index:40; background:var(--panel-bg); color:var(--panel-ink);
    border:1px solid var(--panel-line); border-radius:20px; padding:8px 18px;
    font-family:var(--sans); font-size:.8rem; letter-spacing:.06em;
    opacity:0; transition:opacity .4s ease, transform .4s ease; pointer-events:none;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  #toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- panel ---------- */
  #panel{
    position:fixed; z-index:25; left:50%; transform:translateX(-50%);
    bottom:calc(10px + env(safe-area-inset-bottom));
    width:min(460px, calc(100vw - 16px));
    max-height:calc(100vh - 120px);
    background:var(--panel-bg); border:1px solid var(--panel-line); border-radius:18px;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    padding:14px 16px 12px; color:var(--panel-ink); font-family:var(--sans);
    transition:opacity .5s ease, transform .5s ease;
    overflow-y:auto; overflow-x:hidden;
    scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.15) transparent;
  }
  #panel::-webkit-scrollbar{ width:4px; }
  #panel::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.15); border-radius:2px; }
  #panel.hidden{ opacity:0; transform:translateX(-50%) translateY(24px); pointer-events:none; }

  .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; position:sticky; top:0; background:var(--panel-bg); padding-bottom:6px; z-index:1; }
  .panel-head .lab{ font-family:var(--mono); font-size:.62rem; letter-spacing:.22em; color:var(--panel-dim); text-transform:uppercase; }
  #collapse{
    background:none; border:0; color:var(--panel-dim); font-size:1rem; cursor:pointer;
    padding:2px 8px; border-radius:8px; line-height:1;
  }
  #collapse:hover{ color:var(--panel-ink); }
  #collapse:focus-visible{ outline:2px solid var(--panel-ink); outline-offset:2px; }

  /* group */
  .group{ margin-bottom:10px; }
  .group-title{
    font-family:var(--mono); font-size:.58rem; letter-spacing:.2em; color:var(--panel-dim);
    text-transform:uppercase; margin-bottom:6px; padding-bottom:4px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .presets{ display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .preset{
    flex:1; min-width:54px; border:1px solid var(--panel-line); background:rgba(255,255,255,.05);
    color:var(--panel-dim); border-radius:12px; padding:6px 4px; cursor:pointer;
    font-family:var(--serif); font-size:.76rem; letter-spacing:.1em;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    transition:border-color .25s, color .25s, background .25s;
  }
  .preset .sw{ width:22px; height:7px; border-radius:3px; }
  .preset.on{ border-color:rgba(255,255,255,.55); color:#fff; background:rgba(255,255,255,.1); }
  .preset:focus-visible{ outline:2px solid var(--panel-ink); outline-offset:2px; }

  .row{ display:grid; grid-template-columns:3.2em 1fr 3em; align-items:center; gap:8px; margin-bottom:5px; }
  .row label{ font-family:var(--serif); font-size:.76rem; letter-spacing:.14em; color:var(--panel-dim); white-space:nowrap; }
  .row output{ font-family:var(--mono); font-size:.65rem; color:var(--panel-dim); text-align:right; font-variant-numeric:tabular-nums; }
  .row input[type=checkbox]{ justify-self:end; accent-color:#809C72; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:20px; background:transparent; cursor:pointer; }
  input[type=range]::-webkit-slider-runnable-track{ height:2px; background:rgba(255,255,255,.22); border-radius:1px; }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:#EAF6F0; margin-top:-6px; box-shadow:0 0 8px rgba(255,255,255,.5); border:0;
  }
  input[type=range]::-moz-range-track{ height:2px; background:rgba(255,255,255,.22); border-radius:1px; }
  input[type=range]::-moz-range-thumb{ width:14px; height:14px; border-radius:50%; background:#EAF6F0; border:0; box-shadow:0 0 8px rgba(255,255,255,.5); }
  input[type=range]:focus-visible{ outline:2px solid var(--panel-ink); outline-offset:2px; border-radius:4px; }

  .actions{ display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .actions button{
    flex:1; min-width:80px; border:1px solid var(--panel-line); background:rgba(255,255,255,.05);
    color:var(--panel-ink); border-radius:12px; padding:8px 6px; cursor:pointer;
    font-family:var(--serif); font-size:.76rem; letter-spacing:.14em;
    transition:background .25s; white-space:nowrap;
  }
  .actions button:hover{ background:rgba(255,255,255,.12); }
  .actions button:focus-visible{ outline:2px solid var(--panel-ink); outline-offset:2px; }
  .actions button.primary{ background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.35); }

  #pill{
    position:fixed; z-index:25; right:14px; bottom:calc(14px + env(safe-area-inset-bottom));
    background:var(--panel-bg); border:1px solid var(--panel-line); border-radius:22px;
    color:var(--panel-ink); font-family:var(--serif); font-size:.8rem; letter-spacing:.2em; text-indent:.1em;
    padding:9px 18px; cursor:pointer; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    opacity:0; pointer-events:none; transition:opacity .5s ease;
  }
  #pill.on{ opacity:1; pointer-events:auto; }
  #pill:focus-visible{ outline:2px solid var(--panel-ink); outline-offset:2px; }

  #fullscreen-toggle{
    position:fixed; z-index:24; left:14px; bottom:calc(14px + env(safe-area-inset-bottom));
    background:var(--panel-bg); border:1px solid var(--panel-line); border-radius:22px;
    color:var(--panel-dim); font-family:var(--serif); font-size:.72rem; letter-spacing:.14em;
    padding:7px 14px; cursor:pointer; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    opacity:0; pointer-events:none; transition:opacity .5s ease;
  }
  #fullscreen-toggle.on{ opacity:1; pointer-events:auto; }
  #fullscreen-toggle:focus-visible{ outline:2px solid var(--panel-ink); outline-offset:2px; }

  /* preset manager modal */
  #preset-modal{
    position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.6);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  #preset-modal.on{ opacity:1; pointer-events:auto; }
  #preset-modal .card{
    background:rgba(14,22,20,.94); border:1px solid var(--panel-line); border-radius:18px;
    padding:20px; width:min(380px,90vw); color:var(--panel-ink); font-family:var(--sans);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  }
  #preset-modal .card h3{ font-family:var(--serif); font-size:1rem; letter-spacing:.2em; margin-bottom:12px; }
  #preset-modal .card textarea{
    width:100%; height:120px; background:rgba(255,255,255,.06); border:1px solid var(--panel-line);
    border-radius:10px; color:var(--panel-ink); font-family:var(--mono); font-size:.7rem;
    padding:10px; resize:vertical; margin-bottom:12px;
  }
  #preset-modal .card .row-btns{ display:flex; gap:8px; }
  #preset-modal .card button{
    flex:1; border:1px solid var(--panel-line); background:rgba(255,255,255,.05);
    color:var(--panel-ink); border-radius:10px; padding:8px 0; cursor:pointer;
    font-family:var(--serif); font-size:.78rem; letter-spacing:.12em;
  }
  #preset-modal .card button:hover{ background:rgba(255,255,255,.12); }

  @media (max-width:400px){
    #panel{ padding:10px 10px 8px; }
    .row{ grid-template-columns:2.8em 1fr 2.6em; gap:6px; }
    .actions button{ font-size:.7rem; letter-spacing:.06em; }
    .preset{ font-size:.68rem; }
  }
</style>
</head>
<body>

<canvas id="stage"></canvas>
<div id="flash"></div>
<div id="title" aria-hidden="true">
  <div class="cn">晨雾未醒</div>
  <span class="en">Verdant Mirage</span>
  <span class="tag">森林的雾还未散，都还来得及</span>
</div>
<div id="whisper" class="whisper"></div>
<div id="hint">轻触森林</div>
<div id="skip">轻触跳过</div>
<div id="toast" role="status"></div>

<!-- Preset JSON import/export modal -->
<div id="preset-modal" aria-hidden="true">
  <div class="card">
    <h3>导入 / 导出预设</h3>
    <textarea id="preset-json" placeholder="将 JSON 粘贴到此处，然后点「导入」"></textarea>
    <div class="row-btns">
      <button id="btn-import">导入</button>
      <button id="btn-modal-export">导出 JSON 到文本框</button>
      <button id="btn-modal-close">关闭</button>
    </div>
  </div>
</div>

<!-- Main control panel -->
<div id="panel" class="hidden" aria-label="风格调参面板">
  <div class="panel-head">
    <span class="lab">Style Lab · 找到那个感觉</span>
    <button id="collapse" title="收起面板" aria-label="收起面板">﹀</button>
  </div>

  <!-- Preset swatches -->
  <div class="group">
    <div class="presets" id="presets" role="group" aria-label="色调预设"></div>
  </div>

  <!-- Fog group -->
  <div class="group">
    <div class="group-title">雾 · Fog</div>
    <div class="row"><label for="sFog">雾量</label><input type="range" id="sFog" min="0" max="100" value="60" aria-label="雾量不透明度"><output id="vFog">60</output></div>
    <div class="row"><label for="sFogSpd">流速</label><input type="range" id="sFogSpd" min="0" max="100" value="50" aria-label="雾漂移速度"><output id="vFogSpd">0.50</output></div>
    <div class="row"><label for="sFogLyr">层数</label><input type="range" id="sFogLyr" min="1" max="4" value="3" step="1" aria-label="雾层数"><output id="vFogLyr">3</output></div>
  </div>

  <!-- Hue / tone group -->
  <div class="group">
    <div class="group-title">色调 · Tone</div>
    <div class="row"><label for="sHue">色相</label><input type="range" id="sHue" min="-180" max="180" value="0" aria-label="整体色相偏移"><output id="vHue">0°</output></div>
    <div class="row"><label for="sSat">饱和</label><input type="range" id="sSat" min="0" max="200" value="100" aria-label="饱和度"><output id="vSat">1.00</output></div>
  </div>

  <!-- Firefly / light group -->
  <div class="group">
    <div class="group-title">光点 · Fireflies</div>
    <div class="row"><label for="sFly">数量</label><input type="range" id="sFly" min="0" max="100" value="45" aria-label="萤火数量"><output id="vFly">45</output></div>
    <div class="row"><label for="sFlySz">大小</label><input type="range" id="sFlySz" min="10" max="200" value="100" aria-label="萤火大小"><output id="vFlySz">1.00</output></div>
    <div class="row"><label for="sFlyGlo">辉光</label><input type="range" id="sFlyGlo" min="0" max="100" value="70" aria-label="辉光强度"><output id="vFlyGlo">70</output></div>
    <div class="row"><label for="sFlyRng">范围</label><input type="range" id="sFlyRng" min="10" max="200" value="100" aria-label="漂移范围"><output id="vFlyRng">1.00</output></div>
    <div class="row"><label for="sFlySpd">速度</label><input type="range" id="sFlySpd" min="10" max="200" value="100" aria-label="萤火速度"><output id="vFlySpd">1.00</output></div>
  </div>

  <!-- Breath / rhythm group -->
  <div class="group">
    <div class="group-title">律动 · Breath</div>
    <div class="row"><label for="sBreAmp">幅度</label><input type="range" id="sBreAmp" min="0" max="100" value="60" aria-label="呼吸幅度"><output id="vBreAmp">60%</output></div>
    <div class="row"><label for="sBrePer">周期</label><input type="range" id="sBrePer" min="30" max="200" value="100" aria-label="呼吸周期"><output id="vBrePer">6.0s</output></div>
  </div>

  <!-- Parallax group -->
  <div class="group">
    <div class="group-title">视差 · Parallax</div>
    <div class="row"><label for="sParLyr">层数</label><input type="range" id="sParLyr" min="3" max="6" value="5" step="1" aria-label="视差层数"><output id="vParLyr">5</output></div>
    <div class="row"><label for="sParInt">强度</label><input type="range" id="sParInt" min="0" max="100" value="65" aria-label="视差强度"><output id="vParInt">65</output></div>
  </div>

  <!-- Stroke / line group -->
  <div class="group">
    <div class="group-title">线条 · Stroke</div>
    <div class="row"><label for="sStroke">描边</label><input type="range" id="sStroke" min="0" max="100" value="0" aria-label="描边粗细"><output id="vStroke">关</output></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button id="btnCopy" class="primary">复制参数</button>
    <button id="btnSavePreset">保存预设</button>
    <button id="btnLoadPreset">管理预设</button>
    <button id="btnReplay">重看入口</button>
  </div>
</div>

<button id="pill">✦ 调一调</button>
<button id="fullscreen-toggle">◧ 全屏</button>

<script>
'use strict';
/* ============================================================
   晨雾未醒 · 风格实验室  v2
   全程序化绘制：分层剪影视差 + 体积雾 + 萤火粒子 + 呼吸律动
   + 树洞倾听者（felt presence）。四套色调预设。

   CONFIG 是单一真相源，渲染只读 CONFIG，控件只写 CONFIG。
   结构便于日后移植小程序 canvas。
   ============================================================ */

/* ============================================================
   CONFIG — single source of truth, decoupled from DOM
   ============================================================ */
const CONFIG = {
  // palette
  preset: '青雾',

  // fog
  fog: 60,          // 0-100  opacity
  fogSpeed: 0.5,    // 0-1    drift speed multiplier
  fogLayers: 3,     // 1-4    number of fog bands

  // tone
  hueShift: 0,      // -180..180  degrees
  saturation: 1.0,  // 0-2        multiplier

  // fireflies
  fly: 45,          // 0-100  density
  flySize: 1.0,     // 0.1-2  size multiplier
  flyGlow: 70,      // 0-100  glow intensity
  flyRange: 1.0,    // 0.1-2  drift range multiplier
  flySpeed: 1.0,    // 0.1-2  speed multiplier

  // breath
  breathAmp: 60,    // 0-100  amplitude %
  breathPeriod: 6.0,// 3-12   seconds

  // parallax
  parallaxLayers: 5,// 3-6   layer count
  parallaxIntensity: 65, // 0-100

  // stroke
  strokeWidth: 0,   // 0-100  0=off

  // view
  portraitMode: true,
};

/* ---------- base palettes (four mood presets — 青雾 is the default starting point) ---------- */
const BASE_PALETTES = {
  '青雾': {
    sky:['#0B2429','#17454A','#2C6B6B'], glow:'#C8F0E4',
    layers:['#7FB5AE','#4E8D88','#2F6B67','#1C4A48','#102F30'],
    fog:'#BFE3DB', fly:'#D8FFEF', accent:'#B04A5A', eye:'#EAFFF6', ground:'#5E9B94'
  },
  '深渊': {
    sky:['#07040F','#150B26','#241440'], glow:'#A8F0C8',
    layers:['#5E4E86','#443768','#2F2450','#1E1738','#120D24'],
    fog:'#8E7BB8', fly:'#A9F5C4', accent:'#59D8B0', eye:'#CFFFE0', ground:'#4A3C74'
  },
  '霓夜': {
    sky:['#04050C','#0A0F22','#131A38'], glow:'#7FD8FF',
    layers:['#3D5580','#2C3E66','#1E2B4C','#131D36','#0A1122'],
    fog:'#5570A8', fly:'#8FE8FF', accent:'#FF5F9E', eye:'#B8F2FF', ground:'#31456F'
  },
  '晨光': {
    sky:['#3A2244','#7A4460','#C97F6F'], glow:'#FFDFAE',
    layers:['#D89C82','#A96C74','#7C4C64','#543452','#33203C'],
    fog:'#F2C8A2', fly:'#FFDA9E', accent:'#FF9E6B', eye:'#FFF3D8', ground:'#B87A72'
  }
};

/* ---------- color helpers (hue shift + saturation) ---------- */
function hexToHsl(hex){
  let [r,g,b] = [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), l=(mx+mn)/2;
  if(mx===mn) return [0,0,l];
  const d=mx-mn, s=l>.5?d/(2-mx-mn):d/(mx+mn);
  let h;
  if(mx===r) h=(g-b)/d+(g<b?6:0);
  else if(mx===g) h=(b-r)/d+2;
  else h=(r-g)/d+4;
  return [h*60, s, l];
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let [r,g,b]=[0,0,0];
  if(h<60) [r,g,b]=[c,x,0];
  else if(h<120) [r,g,b]=[x,c,0];
  else if(h<180) [r,g,b]=[0,c,x];
  else if(h<240) [r,g,b]=[0,x,c];
  else if(h<300) [r,g,b]=[x,0,c];
  else [r,g,b]=[c,0,x];
  return '#'+[r,g,b].map(v=>Math.round((v+m)*255).toString(16).padStart(2,'0')).join('');
}
function shiftHex(hex, hueShift, satMul){
  if(hueShift===0 && satMul===1) return hex;
  let [h,s,l] = hexToHsl(hex);
  h = (h + hueShift + 360) % 360;
  s = Math.min(1, Math.max(0, s * satMul));
  return hslToHex(h, s, l);
}
function shiftPalette(base, hueShift, satMul){
  const out = {};
  for(const [k,v] of Object.entries(base)){
    if(Array.isArray(v)) out[k] = v.map(c=>shiftHex(c, hueShift, satMul));
    else out[k] = shiftHex(v, hueShift, satMul);
  }
  return out;
}

/* ---------- runtime palette (after hue/sat shift) ---------- */
let _palCache = null;
let _palKey = '';
function pal(){
  const key = `${CONFIG.preset}|${CONFIG.hueShift}|${CONFIG.saturation}`;
  if(_palKey===key && _palCache) return _palCache;
  _palCache = shiftPalette(BASE_PALETTES[CONFIG.preset], CONFIG.hueShift, CONFIG.saturation);
  _palKey = key;
  return _palCache;
}
function invalidatePalette(){ _palKey=''; }

/* ---------- utils ---------- */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const easeInOut=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function hexRgb(h){ const n=parseInt(h.slice(1),16); return [n>>16&255,n>>8&255,n&255]; }
function rgba(h,a){ const[r,g,b]=hexRgb(h); return `rgba(${r},${g},${b},${a})`; }
function mix(h1,h2,t){ const a=hexRgb(h1),b=hexRgb(h2); return `rgb(${a.map((v,i)=>Math.round(lerp(v,b[i],t))).join(',')})`; }

function trunk(ctx,x,topY,botY,w,lean){
  // Organic trunk with root flare + natural taper
  const midX=x+lean*(botY-topY)*.5;
  const h=botY-topY;
  const flare=w*.5; // root flare width addition
  ctx.beginPath();
  ctx.moveTo(x-w/2-flare,botY);
  // Left: root → mid → top
  ctx.bezierCurveTo(midX-w*.45,botY-h*.15, midX-w*.38,botY-h*.55, x+lean*h-w*.18,topY);
  // Narrow top
  ctx.lineTo(x+lean*h+w*.18,topY);
  // Right: top → mid → root
  ctx.bezierCurveTo(midX+w*.38,botY-h*.55, midX+w*.45,botY-h*.15, x+w/2+flare,botY);
  ctx.closePath(); ctx.fill();
  if(CONFIG.strokeWidth>0){ ctx.stroke(); }
}

function drawCanopyBlob(ctx,cx,cy,rw,rh,rand){
  // Organic crown: 5-8 overlapping offset ellipses
  const n=5+Math.floor(rand()*4);
  for(let i=0;i<n;i++){
    const ox=(rand()-.5)*rw*1.2;
    const oy=(rand()-.5)*rh*1.4;
    const er=rw*(.35+rand()*.45);
    const er2=rh*(.4+rand()*.5);
    ctx.beginPath();
    ctx.ellipse(cx+ox,cy+oy,er,er2,(rand()-.5)*.6,0,Math.PI*2);
    ctx.fill();
    if(CONFIG.strokeWidth>0) ctx.stroke();
  }
}

function drawFractalTree(ctx,x,baseY,h,w,lean,rand,depth,maxDepth){
  // Recursive fractal tree: trunk segment → branches → canopy
  if(depth>=maxDepth||h<3) return;
  const topX=x+lean*h;
  const topY=baseY-h;
  const midY=baseY-h*.4;
  const wTop=w*(.15+.1*depth/maxDepth); // taper as we go up

  // Draw trunk segment with organic bezier wiggle
  const wg1=(rand()-.5)*w*.8; const wg2=(rand()-.5)*w*.7;
  ctx.beginPath();
  ctx.moveTo(x-w/2,baseY);
  ctx.bezierCurveTo(x-w*.35+wg1,midY, topX-wTop*.6+wg2,topY+h*.25, topX-wTop,topY);
  ctx.lineTo(topX+wTop,topY);
  ctx.bezierCurveTo(topX+wTop*.6+wg2,topY+h*.25, x+w*.35+wg1,midY, x+w/2,baseY);
  ctx.closePath(); ctx.fill();
  if(CONFIG.strokeWidth>0) ctx.stroke();

  // Branches: 2-3 at this level if not terminal
  if(depth<maxDepth-1){
    const nBranches=2+(rand()>.55?1:0);
    for(let i=0;i<nBranches;i++){
      const frac=.35+rand()*.40; // branch point along trunk (0=base, 1=top)
      const bY=baseY-h*frac;
      const bX=lerp(x,topX,frac);
      const bH=h*(.35+rand()*.28); // branch height
      const t=frac; // local x position
      const segW=lerp(w,wTop,t); // interpolated width at branch point
      const bW=segW*.55;
      const bLean=(rand()-.5)*.9; // strong left/right lean
      drawFractalTree(ctx,bX,bY,bH,bW,bLean,rand,depth+1,maxDepth);
    }
  }

  // Terminal canopy blob
  if(depth>=1){
    const crownRw=h*.28, crownRh=h*.18;
    drawCanopyBlob(ctx,topX,topY-h*.05,crownRw,crownRh,rand);
  }
}

function drawNaturalPine(ctx,x,baseY,h,w,rand){
  // Organic conifer: irregular bezier tiers + visible trunk
  const nTiers=5+Math.floor(rand()*4);
  const trunkW=Math.max(2,w*.08);

  // Central trunk
  ctx.fillRect(x-trunkW/2,baseY-h*.28,trunkW,h*.28);

  for(let i=0;i<nTiers;i++){
    const frac=.12+.72*(1-i/nTiers); // position from base (bottom-heavy)
    const tY=baseY-h*frac;
    const tW=w*(.25+.75*(1-i/nTiers)); // wider near bottom
    const tH=h*(.06+.05*rand());
    const asym=(rand()-.5)*tW*.35;
    const droop=(rand()-.2)*tH*.6; // slight downward sag

    ctx.beginPath();
    // Start left of trunk
    ctx.moveTo(x-trunkW/2,tY);
    // Left leaf edge — curve out and down
    ctx.bezierCurveTo(
      x-tW*.55+asym, tY-tH*.2+droop,
      x-tW*.5+rand()*tW*.18, tY-tH+droop,
      x-trunkW*.3, tY-tH*.7+droop
    );
    // Across top
    ctx.bezierCurveTo(
      x+(rand()-.5)*trunkW, tY-tH*.85+droop,
      x+trunkW*.3, tY-tH*.7+droop,
      x+trunkW/2, tY
    );
    // Right leaf edge — curve out and down
    ctx.bezierCurveTo(
      x+tW*.5-rand()*tW*.18, tY-tH+droop,
      x+tW*.55-asym, tY-tH*.2+droop,
      x+trunkW/2, tY
    );
    ctx.closePath(); ctx.fill();
    if(CONFIG.strokeWidth>0) ctx.stroke();
  }
}

function drawClumpTree(ctx,x,baseY,h,w,rand){
  // Multi-trunk cluster from common base
  const nTrunks=2+Math.floor(rand()*4);
  for(let i=0;i<nTrunks;i++){
    const tX=x+(rand()-.5)*w*.4;
    const tH=h*(.6+rand()*.4);
    const tW=w*(.12+rand()*.18);
    const tLean=(rand()-.5)*.35;

    // Thin trunk with slight curve
    const topX=tX+tLean*tH;
    ctx.beginPath();
    ctx.moveTo(tX-tW/2,baseY);
    ctx.bezierCurveTo(tX-tW*.3,baseY-tH*.35, topX-tW*.7,baseY-tH*.7, topX-tW*.3,baseY-tH);
    ctx.lineTo(topX+tW*.3,baseY-tH);
    ctx.bezierCurveTo(topX+tW*.7,baseY-tH*.7, tX+tW*.3,baseY-tH*.35, tX+tW/2,baseY);
    ctx.closePath(); ctx.fill();
    if(CONFIG.strokeWidth>0) ctx.stroke();

    // Small canopy at top
    drawCanopyBlob(ctx,topX,baseY-tH,tH*.22,tH*.14,rand);
  }
}
function fanPalm(ctx,x,y,r,blades,spread,rot){
  for(let i=0;i<blades;i++){
    const a=rot-spread/2+spread*i/(blades-1), bw=r*.085;
    ctx.save(); ctx.translate(x,y); ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.quadraticCurveTo(r*.5,-bw*1.6, r,-bw*.28);
    ctx.quadraticCurveTo(r*.55,bw*.9, 0,bw*.5);
    ctx.closePath(); ctx.fill();
    if(CONFIG.strokeWidth>0) ctx.stroke();
    ctx.restore();
  }
}
function bigLeaf(ctx,x,y,len,wr,rot){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  const w=len*wr;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(len*.18,-w, len*.72,-w*.82, len,-len*.04);
  ctx.bezierCurveTo(len*.7,w*.7, len*.2,w*.85, 0,0);
  ctx.closePath(); ctx.fill();
  if(CONFIG.strokeWidth>0) ctx.stroke();
  ctx.restore();
}
function bush(ctx,x,y,r){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const bx=x+(i-2.5)*r*.42, br=r*(.55+.28*Math.sin(i*2.7));
    ctx.moveTo(bx+br,y); ctx.arc(bx,y,br,0,Math.PI,true);
  }
  ctx.rect(x-r*1.6,y-1,r*3.2,r); ctx.fill();
  if(CONFIG.strokeWidth>0) ctx.stroke();
}
function hangBranch(ctx,x0,drop,segs,color,accent,rand){
  ctx.strokeStyle=color; ctx.lineCap='round';
  let x=x0,y=-10;
  ctx.lineWidth=drop*.045;
  ctx.beginPath(); ctx.moveTo(x,y);
  const pts=[[x,y]];
  for(let i=1;i<=segs;i++){
    x+=(rand()-.42)*drop*.4; y+=drop/segs;
    ctx.quadraticCurveTo(x-(rand()-.5)*20,y-drop/segs/2,x,y); pts.push([x,y]);
  }
  ctx.stroke();
  ctx.fillStyle=color;
  for(let i=2;i<pts.length;i+=2){
    bigLeaf(pts[i][0],pts[i][1],drop*.22,.5,(rand()*1.6-0.8)+Math.PI/3);
    ctx.fillStyle=color;
  }
  const f=pts[pts.length-1];
  ctx.fillStyle=accent;
  ctx.beginPath(); ctx.arc(f[0],f[1]+6,drop*.055,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.beginPath(); ctx.arc(f[0]-drop*.018,f[1]+6-drop*.018,drop*.011,0,7); ctx.fill();
}

function buildGeometry(){
  listener.rx = 0;
  const rand = mulberry32(20260712);
  const portrait = effectiveH > effectiveW;
  const g = { layers:[[],[],[],[],[],[]], rand };
  const L = CONFIG.parallaxLayers;
  const seedBase = 71200;

  // Layer constraints per parallax distance: [minH,maxH, minW,maxW, maxDepth, count]
  const LCFG = [
    [0.12,0.28, 0.008,0.018, 2, portrait?16:22],  // L0: far — thin, short, dense wall
    [0.18,0.40, 0.012,0.028, 3, portrait?11:16],  // L1: mid-far — taller
    [0.25,0.55, 0.016,0.038, 4, portrait?7:11],   // L2: mid — detail visible
    [0.30,0.65, 0.020,0.048, 4, portrait?5:8],    // L3: mid-near
    [0.35,0.80, 0.024,0.060, 5, portrait?4:6],    // L4: near
    [0.45,0.95, 0.028,0.075, 5, portrait?3:4],    // L5: nearest
  ];

  function randTree(layer, n){
    const cfg=LCFG[layer];
    for(let i=0;i<n;i++){
      const x=.02+.96*((i+.5)/n+(rand()-.5)*.08);
      const h=cfg[0]+rand()*(cfg[1]-cfg[0]);
      const w=cfg[2]+rand()*(cfg[3]-cfg[2]);
      const lean=(rand()-.5)*(layer<3?.12:.18);
      const baseY=.58+rand()*.42; // ground-level variance
      const maxD=cfg[4];
      const seed=seedBase+layer*1000+i;
      g.layers[layer].push({t:'ftree', x, baseY, h, w, lean, seed, maxDepth:maxD});
    }
  }
  function randPine(layer, n){
    for(let i=0;i<n;i++){
      const x=.04+.92*((i+.5)/n+(rand()-.5)*.07);
      const h=LCFG[layer][0]*1.2+rand()*(LCFG[layer][1]*1.1-LCFG[layer][0]*1.2);
      const w=LCFG[layer][2]*1.5+rand()*(LCFG[layer][3]*1.4-LCFG[layer][2]*1.5);
      const baseY=.60+rand()*.35;
      g.layers[layer].push({t:'npine', x, baseY, h, w, seed:seedBase+layer*1000+500+n+i});
    }
  }

  // Layer 0 — far forest wall (all fractal)
  if(L>0) randTree(0,LCFG[0][5]);

  // Layer 1 — mid-far: mix fractal + pine + palms + bushes + path
  if(L>1){
    g.layers[1].push({t:'path'});
    randTree(1,LCFG[1][5]-3);
    randPine(1, portrait?3:5);
    g.layers[1].push({t:'palm', x:.06+rand()*.04, y:.58+rand()*.12, r:.25+rand()*.08, blades:6+Math.floor(rand()*3), spread:1.8+rand()*.4, rot:-.4+rand()*.2});
    g.layers[1].push({t:'palm', x:.92+rand()*.05, y:.54+rand()*.12, r:.22+rand()*.08, blades:5+Math.floor(rand()*3), spread:1.6+rand()*.5, rot:Math.PI+.3+rand()*.2});
    for(let i=0;i<(portrait?5:8);i++) g.layers[1].push({t:'bush', x:.05+.9*i/(portrait?4:7)+(rand()-.5)*.05, y:.78+rand()*.05, r:.04+rand()*.04});
  }

  // Layer 2 — mid: mix fractal + pine + clump + leaf frame + branch
  if(L>2){
    randTree(2,LCFG[2][5]-2);
    randPine(2, portrait?2:4);
    if(rand()>.35) g.layers[2].push({t:'ctree', x:.15+rand()*.7, baseY:.62+rand()*.3, h:.30+rand()*.25, w:.025+rand()*.035, seed:seedBase+2999});
    g.layers[2].push({t:'leaf', x:-.02+rand()*.02, y:.70+rand()*.08, len:.30+rand()*.1, wr:.38+rand()*.08, rot:-.4+rand()*.3});
    g.layers[2].push({t:'leaf', x:1.01+rand()*.03, y:.72+rand()*.12, len:.32+rand()*.1, wr:.38+rand()*.08, rot:Math.PI+.3+rand()*.3});
    g.layers[2].push({t:'palm', x:.46+rand()*.08, y:1.0+rand()*.06, r:.20+rand()*.08, blades:7+Math.floor(rand()*2), spread:2.2+rand()*.6, rot:-Math.PI/2-1.1+rand()*.4});
    for(let i=0;i<(portrait?4:6);i++) g.layers[2].push({t:'bush', x:.06+.88*i/(portrait?3:5)+(rand()-.5)*.06, y:.88+rand()*.06, r:.06+rand()*.05});
    g.layers[2].push({t:'branch', x:.18+rand()*.1, drop:.25+rand()*.12});
  }

  // Layer 3 — mid-near: fractal + palm + leaf frame + branch
  if(L>3){
    randTree(3,LCFG[3][5]);
    g.layers[3].push({t:'leaf', x:-.03+rand()*.03, y:.96+rand()*.1, len:.48+rand()*.1, wr:.36+rand()*.08, rot:-.55+rand()*.25});
    g.layers[3].push({t:'leaf', x:.06+rand()*.08, y:1.0+rand()*.1, len:.38+rand()*.1, wr:.40+rand()*.08, rot:-.9+rand()*.3});
    g.layers[3].push({t:'leaf', x:1.02+rand()*.03, y:.98+rand()*.12, len:.50+rand()*.1, wr:.36+rand()*.08, rot:Math.PI+.5+rand()*.3});
    g.layers[3].push({t:'palm', x:-.04+rand()*.04, y:.16+rand()*.1, r:.26+rand()*.1, blades:5+Math.floor(rand()*3), spread:1.3+rand()*.5, rot:.4+rand()*.3});
    g.layers[3].push({t:'branch', x:.68+rand()*.1, drop:.30+rand()*.15});
  }

  // Layer 4 — near: listener trunk + large fractal trees + leaf frame
  if(L>4){
    const lx = portrait ? .84 : .8;
    g.layers[4].push({t:'trunk', x:lx, w:.18+rand()*.04, lean:.02+(rand()-.5)*.04, top:-.06, bot:1.06, listener:true});
    randTree(4,LCFG[4][5]-1);
    // One big foreground fractal tree on the opposite side from listener
    const farX = portrait ? .12 : .15;
    g.layers[4].push({t:'ftree', x:farX+rand()*.06, baseY:.60+rand()*.3, h:.50+rand()*.30, w:.040+rand()*.030, lean:.06+(rand()-.5)*.1, seed:seedBase+4999, maxDepth:5});
    g.layers[4].push({t:'leaf', x:lx-.13+rand()*.04, y:.12+rand()*.1, len:.22+rand()*.1, wr:.44+rand()*.1, rot:2.2+rand()*.5});
    g.layers[4].push({t:'leaf', x:lx+.08+rand()*.05, y:.72+rand()*.12, len:.26+rand()*.1, wr:.42+rand()*.08, rot:Math.PI-.4+rand()*.3});
    g.layers[4].push({t:'leaf', x:-.02+rand()*.03, y:-.04+rand()*.04, len:.36+rand()*.1, wr:.38+rand()*.08, rot:.8+rand()*.4});
    g.layers[4].push({t:'leaf', x:.12+rand()*.08, y:-.06+rand()*.03, len:.26+rand()*.1, wr:.44+rand()*.1, rot:1.1+rand()*.3});
  }

  // Layer 5 — nearest: giant foreground silhouettes
  if(L>5){
    g.layers[5].push({t:'ctree', x:.06+rand()*.12, baseY:.65+rand()*.25, h:.55+rand()*.35, w:.045+rand()*.030, seed:seedBase+5999});
    g.layers[5].push({t:'ftree', x:.88+rand()*.08, baseY:.60+rand()*.30, h:.60+rand()*.30, w:.050+rand()*.025, lean:-.04+(rand()-.5)*.1, seed:seedBase+6999, maxDepth:5});
    g.layers[5].push({t:'leaf', x:-.01+rand()*.03, y:1.0+rand()*.08, len:.56+rand()*.12, wr:.34+rand()*.08, rot:-.75+rand()*.2});
    g.layers[5].push({t:'leaf', x:1.01+rand()*.03, y:1.02+rand()*.1, len:.54+rand()*.12, wr:.32+rand()*.08, rot:Math.PI+.6+rand()*.3});
    g.layers[5].push({t:'palm', x:.01+rand()*.04, y:.08+rand()*.08, r:.30+rand()*.12, blades:6+Math.floor(rand()*2), spread:1.4+rand()*.5, rot:.6+rand()*.3});
  }

  return g;
}

function renderLayerSprite(k){
  const c = document.createElement('canvas');
  const w = W+2*BLEED, h = H+2*BLEED;
  c.width = w*DPR; c.height = h*DPR;
  const ctx = c.getContext('2d');
  ctx.scale(DPR,DPR); ctx.translate(BLEED,BLEED);
  const pcols = pal().layers;
  const col = pcols[k]||pcols[pcols.length-1];
  const fogged = mix(col, pal().fog, k===0?.12:k===1?.04:0);
  ctx.fillStyle = fogged;
  if(CONFIG.strokeWidth>0){
    ctx.strokeStyle = rgba(pal().layers[4], CONFIG.strokeWidth/100*0.7);
    ctx.lineWidth = CONFIG.strokeWidth/100*3;
  }
  const S = Math.min(W,H);
  const layerData = geo.layers[k]||[];
  for(const e of layerData){
    ctx.fillStyle = fogged;
    if(CONFIG.strokeWidth>0) ctx.strokeStyle = rgba(pal().layers[4], CONFIG.strokeWidth/100*0.7);
    if(e.t==='trunk'){
      trunk(ctx, e.x*W, e.top*H, e.bot*H, Math.max(3,e.w*W*(H>W?1.6:1)), e.lean);
      if(e.listener){
        const hx=e.x*W, hy=.56*H, rx=S*.075, ry=S*.1;
        listener.x=hx; listener.y=hy; listener.rx=rx; listener.ry=ry;
        ctx.fillStyle = mix(col,'#000000',.55);
        ctx.beginPath(); ctx.ellipse(hx,hy,rx,ry,0,0,7); ctx.fill();
        ctx.strokeStyle = rgba(pal().eye,.16); ctx.lineWidth=2;
        ctx.beginPath(); ctx.ellipse(hx,hy,rx*1.06,ry*1.06,0,0,7); ctx.stroke();
      }
    }
    else if(e.t==='ftree') drawFractalTree(ctx, e.x*W, e.baseY*H, e.h*H, e.w*W, e.lean, mulberry32(e.seed), 0, e.maxDepth||4);
    else if(e.t==='npine') drawNaturalPine(ctx, e.x*W, e.baseY*H, e.h*H, e.w*W, mulberry32(e.seed));
    else if(e.t==='ctree') drawClumpTree(ctx, e.x*W, e.baseY*H, e.h*H, e.w*W, mulberry32(e.seed));
    else if(e.t==='palm') fanPalm(ctx, e.x*W, e.y*H, e.r*S*1.35, e.blades, e.spread, e.rot);
    else if(e.t==='leaf') bigLeaf(ctx, e.x*W, e.y*H, e.len*S*1.2, e.wr, e.rot);
    else if(e.t==='bush') bush(ctx, e.x*W, e.y*H, e.r*S);
    else if(e.t==='branch') hangBranch(ctx, e.x*W, e.drop*H, 6, fogged, pal().accent, mulberry32(999+e.x*1000));
    else if(e.t==='path'){
      const gnd = mix(pal().ground, pal().fog, .25);
      ctx.fillStyle = gnd;
      ctx.beginPath();
      ctx.moveTo(W*.5-W*.05, H*.6);
      ctx.bezierCurveTo(W*.3,H*.72, W*.16,H*.86, W*.02,H*1.01);
      ctx.lineTo(W*.98,H*1.01);
      ctx.bezierCurveTo(W*.84,H*.84, W*.68,H*.7, W*.5+W*.05,H*.6);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = rgba(pal().layers[2],.5);
      const r2 = mulberry32(77);
      for(let i=0;i<7;i++){
        const py=.66+.3*r2(), px=.5+(r2()-.5)*(.1+.5*(py-.66));
        ctx.beginPath(); ctx.ellipse(px*W,py*H,S*(.015+.03*r2()),S*.011,0,0,7); ctx.fill();
      }
    }
  }
  return c;
}

function renderStatics(){
  vignette = document.createElement('canvas');
  vignette.width=W*DPR; vignette.height=H*DPR;
  let ctx=vignette.getContext('2d'); ctx.scale(DPR,DPR);
  const vg=ctx.createRadialGradient(W/2,H*.46,Math.min(W,H)*.35, W/2,H*.5,Math.max(W,H)*.78);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.42)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  grain = document.createElement('canvas'); grain.width=grain.height=128;
  ctx=grain.getContext('2d');
  const im=ctx.createImageData(128,128);
  for(let i=0;i<im.data.length;i+=4){ const v=Math.random()*255|0; im.data[i]=im.data[i+1]=im.data[i+2]=v; im.data[i+3]=14; }
  ctx.putImageData(im,0,0);

  fogSprite = document.createElement('canvas'); fogSprite.width=fogSprite.height=256;
  ctx=fogSprite.getContext('2d');
  const fg=ctx.createRadialGradient(128,128,0,128,128,128);
  fg.addColorStop(0,rgba(pal().fog,.5)); fg.addColorStop(.55,rgba(pal().fog,.22)); fg.addColorStop(1,rgba(pal().fog,0));
  ctx.fillStyle=fg; ctx.fillRect(0,0,256,256);

  flySprite = document.createElement('canvas'); flySprite.width=flySprite.height=64;
  ctx=flySprite.getContext('2d');
  const fl=ctx.createRadialGradient(32,32,0,32,32,32);
  fl.addColorStop(0,rgba(pal().fly,.95)); fl.addColorStop(.25,rgba(pal().fly,.4)); fl.addColorStop(1,rgba(pal().fly,0));
  ctx.fillStyle=fl; ctx.fillRect(0,0,64,64);
}

function buildFog(){
  const rand=mulberry32(4242);
  fogBlobs=[];
  const n = degraded?8:14;
  for(let i=0;i<n;i++){
    fogBlobs.push({
      x:rand()*1.4-.2, y:.18+rand()*.72, r:(.28+rand()*.5),
      sp:(.004+rand()*.012)*(rand()>.5?1:-1), band:i%CONFIG.fogLayers, ph:rand()*7
    });
  }
}
function buildFlies(){
  const rand=mulberry32(888);
  flies=[];
  const n = Math.round(CONFIG.fly/100 * (degraded?60:110));
  for(let i=0;i<n;i++){
    flies.push({
      x:rand(), y:.15+rand()*.75, r:.8+rand()*2.4,
      a1:rand()*7, a2:rand()*7, s1:.3+rand()*.7, s2:.3+rand()*.7,
      tw:rand()*7, deep:rand()<.12, target:null
    });
  }
}

/* ---------- entry walls ---------- */
function buildEntry(){
  entryWalls=[];
  for(let wI=0;wI<5;wI++){
    const c=document.createElement('canvas');
    c.width=W*DPR; c.height=H*DPR;
    const ctx=c.getContext('2d'); ctx.scale(DPR,DPR);
    const rand=mulberry32(300+wI*17);
    const col = mix(pal().layers[4]||pal().layers[3],'#000000',.15+wI*.06);
    ctx.fillStyle=col;
    const S=Math.min(W,H);
    for(let i=0;i<46;i++){
      const ang=rand()*Math.PI*2;
      const rad=Math.hypot(W,H)*(.2+.42*Math.sqrt(rand()));
      const x=W/2+Math.cos(ang)*rad, y=H*.46+Math.sin(ang)*rad*.9;
      if(Math.hypot((x-W/2)/(W+.001),(y-H*.46)/(H+.001))<.16) continue;
      ctx.fillStyle=col;
      if(rand()>.4) bigLeaf(ctx,x,y,S*(.14+rand()*.22),.42+rand()*.2, ang+Math.PI+(rand()-.5));
      else fanPalm(ctx,x,y,S*(.12+rand()*.14),5+(rand()*3|0),1.6,ang+Math.PI);
    }
    entryWalls.push(c);
  }
}

/* ============================================================
   render
   ============================================================ */
function skyPaint(ctx,glowK){
  const g=ctx.createLinearGradient(0,0,0,H);
  const p=pal();
  g.addColorStop(0,p.sky[0]); g.addColorStop(.55,p.sky[1]); g.addColorStop(1,p.sky[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const glowVal = CONFIG.flyGlow/100;
  const gr=(0.25+glowVal*0.55)*Math.min(W,H);
  const ga=(0.25+glowVal*0.75)*glowK;
  const rg=ctx.createRadialGradient(W/2,H*.5,0,W/2,H*.5,gr);
  rg.addColorStop(0,rgba(p.glow,.85*ga)); rg.addColorStop(.4,rgba(p.glow,.3*ga)); rg.addColorStop(1,rgba(p.glow,0));
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
}
function shafts(ctx,t){
  const p=pal();
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(let i=0;i<4;i++){
    const x=W*(.3+.14*i), a=.028+.02*Math.sin(t*.3+i*2.1);
    ctx.save(); ctx.translate(x,0); ctx.rotate(.06+i*.025);
    const g=ctx.createLinearGradient(0,0,0,H*.8);
    g.addColorStop(0,rgba(p.glow,a)); g.addColorStop(1,rgba(p.glow,0));
    ctx.fillStyle=g; ctx.fillRect(-W*.02,0,W*.04,H*.8);
    ctx.restore();
  }
  ctx.restore();
}
function drawFogBand(ctx,band,t,breath){
  const base=(CONFIG.fog/100)*1.15;
  if(base<=0.01) return;
  const spdMult = CONFIG.fogSpeed;
  const motMult = reduceMotion ? 0 : 1;
  for(const b of fogBlobs){
    if(b.band!==band) continue;
    let bx=(b.x + t*b.sp*spdMult*motMult)%1.4; if(bx<-.2)bx+=1.4;
    const alpha=base*(.5+.3*Math.sin(t*.2+b.ph))*(.8+.2*breath);
    ctx.globalAlpha=clamp(alpha,0,1);
    const r=b.r*Math.min(W,H);
    ctx.drawImage(fogSprite,(bx-.1)*W-r, b.y*H-r*.62, r*2, r*1.24);
  }
  ctx.globalAlpha=1;
}
function drawFlies(ctx,t){
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const spd = CONFIG.flySpeed;
  const range = CONFIG.flyRange;
  const sizeMul = CONFIG.flySize;
  for(const f of flies){
    let fx,fy;
    if(f.target){
      f.tp=Math.min(1,(t-f.t0)/2.4);
      fx=lerp(f.sx,f.target[0],easeInOut(f.tp)); fy=lerp(f.sy,f.target[1],easeInOut(f.tp));
      if(f.tp>=1){ f.x=fx/W; f.y=fy/H; f.target=null; }
    } else {
      const wob=reduceMotion?0:1;
      fx=(f.x + Math.sin(t*f.s1*.35*spd+f.a1)*.015*range*wob)*W;
      fy=(f.y + Math.sin(t*f.s2*.28*spd+f.a2)*.02*range*wob)*H;
    }
    const tw=.45+.55*Math.sin(t*1.4+f.tw)**2;
    const sz=(f.deep?7:3.2)*f.r*sizeMul;
    ctx.globalAlpha=tw*(f.deep?.8:.95);
    ctx.drawImage(flySprite,fx-sz*2,fy-sz*2,sz*4,sz*4);
  }
  ctx.globalAlpha=1; ctx.restore();
}
function drawEyes(ctx,t){
  const L=listener;
  if(!L.rx) return;
  if(t>L.nextBlink){ L.blinkT=t; L.nextBlink=t+2.6+Math.random()*4.5; }
  const bt=t-L.blinkT;
  L.blink = bt<.16 ? Math.abs(Math.sin(bt/.16*Math.PI)) < .5 ? .08 : 1 : 1;
  const open = bt<.18 ? Math.max(.06,Math.abs(Math.cos(bt/.18*Math.PI))) : 1;
  const dx=clamp((pointer.x-L.x)/(W+.001),-1,1)*L.rx*.16;
  const dy=clamp((pointer.y-L.y)/(H+.001),-1,1)*L.ry*.1;
  const pulse=1+L.pulse*.5;
  const er=L.rx*.16*pulse, gap=L.rx*.42;
  const p=pal();
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const s of [-1,1]){
    const ex=L.x+s*gap+dx, ey=L.y-L.ry*.08+dy;
    const gsz=er*5*(1+L.pulse);
    ctx.globalAlpha=.5+.4*L.pulse+.12*Math.sin(t*1.2);
    ctx.drawImage(flySprite,ex-gsz,ey-gsz,gsz*2,gsz*2);
    ctx.globalAlpha=.95;
    ctx.fillStyle=p.eye;
    ctx.save(); ctx.translate(ex,ey); ctx.scale(1,open);
    ctx.beginPath(); ctx.ellipse(0,0,er*.55,er,0,0,7); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  L.pulse*=.94;
}
function drawRipples(ctx,t){
  const p=pal();
  ripples=ripples.filter(r=>t-r.t0<1.6);
  for(const r of ripples){
    const time=(t-r.t0)/1.6;
    ctx.strokeStyle=rgba(p.fly,(1-time)*.5);
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(r.x,r.y,10+time*70,0,7); ctx.stroke();
  }
}

/* parallax offsets per layer (expanding with layer count) */
const PARX_ALL=[4,9,15,24,34,45], PARY_ALL=[2,4,7,10,14,18], BAMP_ALL=[.0018,.003,.0045,.006,.0085,.011];

function drawScene(now){
  const t=(now-tStart)/1000;
  const period = CONFIG.breathPeriod;
  const amp = CONFIG.breathAmp/100;
  const breath=reduceMotion?0:Math.sin(t*Math.PI*2/period)*amp;
  const pi = CONFIG.parallaxIntensity/100;
  pointer.x=lerp(pointer.x,pointer.tx,.04); pointer.y=lerp(pointer.y,pointer.ty,.04);
  const px=(pointer.x/W-.5)*2*pi, py=(pointer.y/H-.5)*2*pi;
  const sway=reduceMotion?0:Math.sin(t*.07)*3*pi;
  const nLayers = CONFIG.parallaxLayers;

  skyPaint(cx2,1+.06*breath);
  if(!reduceMotion) shafts(cx2,t);

  // Fog bands — drawn independently of parallax layer count
  if(CONFIG.fogLayers>=1) drawFogBand(cx2,0,t,breath);

  for(let k=0;k<nLayers;k++){
    if(k===3 && CONFIG.fogLayers>=2) drawFogBand(cx2,1,t,breath);
    cx2.save();
    const s=1+BAMP_ALL[k]*breath;
    cx2.translate(W/2,H*.62); cx2.scale(s,s); cx2.translate(-W/2,-H*.62);
    cx2.translate(-px*PARX_ALL[k]-sway*(k+1)*.3, -py*PARY_ALL[k]);
    if(sprites[k]) cx2.drawImage(sprites[k],-BLEED,-BLEED,W+2*BLEED,H+2*BLEED);
    if(k===Math.min(4,nLayers-1) && listener.rx){ drawEyes(cx2,t); }
    cx2.restore();
  }
  if(CONFIG.fogLayers>=3) drawFogBand(cx2,2,t,breath);
  if(CONFIG.fogLayers>=4) drawFogBand(cx2,3,t,breath);
  drawFlies(cx2,t);
  drawRipples(cx2,t);
  cx2.drawImage(vignette,0,0,W,H);
  cx2.globalAlpha=.05;
  cx2.drawImage(grain, reduceMotion?0:((t*7)%128)-128, reduceMotion?0:((t*3)%128)-128, W+256, H+256);
  cx2.globalAlpha=1;
}

/* ---------- entry ---------- */
const ENTRY_DUR=5.2, WALL_DELAY=.62, WALL_TIME=2.6;
function drawEntry(now){
  const t=(now-tStart)/1000;
  const total=clamp(t/ENTRY_DUR,0,1);
  const p=pal();
  skyPaint(cx2,.3+total*1.4);
  cx2.fillStyle=rgba(p.fog,.2+.5*easeInOut(total));
  cx2.fillRect(0,0,W,H);
  const rg=cx2.createRadialGradient(W/2,H*.46,0,W/2,H*.46,Math.min(W,H)*.75);
  rg.addColorStop(0,rgba(p.glow,.25+.75*total)); rg.addColorStop(1,rgba(p.glow,0));
  cx2.fillStyle=rg; cx2.fillRect(0,0,W,H);
  if(CONFIG.fogLayers>=1) drawFogBand(cx2,0,t,0);
  for(let i=entryWalls.length-1;i>=0;i--){
    const tp=clamp((t-i*WALL_DELAY)/WALL_TIME,0,1);
    if(tp>=1) continue;
    const s=lerp(1,4.6,easeInOut(tp));
    const alpha=tp<.72?1:1-(tp-.72)/.28;
    cx2.save(); cx2.globalAlpha=alpha;
    cx2.translate(W/2,H*.46); cx2.scale(s,s); cx2.translate(-W/2,-H*.46);
    cx2.drawImage(entryWalls[i],0,0,W,H);
    cx2.restore();
  }
  cx2.drawImage(vignette,0,0,W,H);
  if(t>ENTRY_DUR) toFlash();
}
function toFlash(){
  if(mode==='flash') return;
  mode='flash'; flashT0=performance.now();
  document.getElementById('skip').style.opacity=0;
}
function drawFlash(now){
  const t=(now-flashT0)/1000;
  const el=document.getElementById('flash');
  if(t<.35){ drawEntry(now); el.style.opacity=(t/.35).toFixed(3); }
  else{
    el.style.opacity=Math.max(0,1-(t-.35)/1.8).toFixed(3);
    if(!drawFlash.sceneReady){ tStart=performance.now(); drawFlash.sceneReady=true; }
    drawScene(now);
    if(t>.9) revealUI();
    if(t>2.3){ mode='scene'; el.style.opacity=0; }
  }
}
let uiRevealed=false;
function revealUI(){
  if(uiRevealed) return; uiRevealed=true;
  const title=document.getElementById('title');
  title.style.opacity=1;
  setTimeout(()=>{ title.style.opacity=0; },4600);
  setTimeout(()=>{
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('fullscreen-toggle').classList.add('on');
    if(!hintShown){ document.getElementById('hint').style.opacity=1; hintShown=true;
      setTimeout(()=>document.getElementById('hint').style.opacity=0, 6000); }
  },1200);
}

/* ---------- main loop + auto-degrade ---------- */
function loop(now){
  try {
    cx2.setTransform(DPR,0,0,DPR,0,0);

    if(mode==='entry') drawEntry(now);
    else if(mode==='flash') drawFlash(now);
    else drawScene(now);

    // perf guard
    frameTimes.push(now);
    if(frameTimes.length>90){
      const span=frameTimes[89]-frameTimes[0]; frameTimes=[];
      if(!degraded && span/89>30){ degraded=true; buildFog(); buildFlies(); }
    }
  } catch(e) {
    // Safety net: show error visibly on canvas so we know rendering broke
    cx2.fillStyle = '#331111';
    cx2.fillRect(0,0,W||window.innerWidth,H||window.innerHeight);
    cx2.fillStyle = '#ff6666';
    cx2.font = '14px monospace';
    cx2.fillText('Render error: ' + (e.message||e), 20, 50);
    console.error('style-lab render loop error:', e);
  }
  requestAnimationFrame(loop);
}

/* ============================================================
   interaction
   ============================================================ */
function interact(x,y,now){
  if(mode==='entry'){ tStart=now-ENTRY_DUR*1000; return; }
  if(mode!=='scene' && mode!=='flash') return;
  const L=listener;
  const nearListener = L.rx && Math.hypot((x-L.x)/(L.rx*2.1),(y-L.y)/(L.ry*2.1))<1;
  if(nearListener){
    L.pulse=1; L.blinkT=(now-tStart)/1000-1;
    ripples.push({x:L.x,y:L.y,t0:(now-tStart)/1000});
    let sent=0;
    for(const f of flies){ if(sent>=3) break; if(!f.target && Math.random()<.4){
      f.target=[L.x+(Math.random()-.5)*L.rx, L.y-L.ry*.2+(Math.random()-.5)*L.ry*.5];
      f.sx=f.x*W; f.sy=f.y*H; f.t0=(now-tStart)/1000; sent++; } }
    const wp=document.getElementById('whisper');
    wp.textContent=WHISPERS[whisperIdx++%WHISPERS.length];
    wp.style.left=L.x+'px'; wp.style.top=(L.y-L.ry*1.5)+'px';
    wp.style.opacity=1;
    clearTimeout(interact._wt);
    interact._wt=setTimeout(()=>wp.style.opacity=0,2600);
  } else {
    ripples.push({x,y,t0:(now-tStart)/1000});
  }
}

cv.addEventListener('pointermove',e=>{
  const rect=cv.getBoundingClientRect();
  pointer.tx=e.clientX-rect.left; pointer.ty=e.clientY-rect.top;
});
cv.addEventListener('pointerdown',e=>{
  const rect=cv.getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;
  pointer.tx=x; pointer.ty=y;
  interact(x,y,performance.now());
});

function configToCSSVars(){
  const p = pal(); // export actual shifted palette
  const lines = [
    '/* 晨雾未醒 · 风格实验室 导出 */',
    '/* 预设: '+CONFIG.preset+' */',
    ':root {',
  ];
  // palette colors
  for(const [k,v] of Object.entries(p)){
    if(Array.isArray(v)){
      v.forEach((c,i)=>lines.push(`  --color-${k}-${i}: ${c};`));
    } else {
      lines.push(`  --color-${k}: ${v};`);
    }
  }
  // tuning params
  lines.push('  --fog-opacity: '+CONFIG.fog+'%;');
  lines.push('  --fog-speed: '+CONFIG.fogSpeed.toFixed(2)+';');
  lines.push('  --fog-layers: '+CONFIG.fogLayers+';');
  lines.push('  --hue-shift: '+CONFIG.hueShift+'deg;');
  lines.push('  --saturation: '+CONFIG.saturation.toFixed(2)+';');
  lines.push('  --firefly-count: '+CONFIG.fly+'%;');
  lines.push('  --firefly-size: '+CONFIG.flySize.toFixed(2)+';');
  lines.push('  --firefly-glow: '+CONFIG.flyGlow+'%;');
  lines.push('  --firefly-range: '+CONFIG.flyRange.toFixed(2)+';');
  lines.push('  --firefly-speed: '+CONFIG.flySpeed.toFixed(2)+';');
  lines.push('  --breath-amplitude: '+CONFIG.breathAmp+'%;');

  lines.push('  --parallax-intensity: '+CONFIG.parallaxIntensity+'%;');
  lines.push('  --stroke-width: '+CONFIG.strokeWidth+';');
  lines.push('}');
  return lines.join('\n');
}

  const done=()=>toast('已收下这一刻的参数 ✓');
  const fail=()=>toast('复制失败，请手动复制');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done,fail);
  else{
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand('copy'); done(); }catch(e){ fail(); } ta.remove();
  }
});

// Save preset button
$('btnSavePreset').addEventListener('click',()=>{
  const snap = JSON.parse(JSON.stringify(CONFIG));
  snap.savedAt = new Date().toLocaleString('zh-CN');
  savedPresets.push(snap);
  toast('预设已保存 ('+savedPresets.length+'个)');
});

// Manage presets button
const presetModal = $('preset-modal');
const presetJsonTA = $('preset-json');
$('btnLoadPreset').addEventListener('click',()=>{
  if(savedPresets.length===0){
    presetJsonTA.value = '暂无已保存的预设。\n\n你可以：\n1. 先点「保存预设」保存当前参数\n2. 或粘贴外部 JSON 点「导入」';
  } else {
    presetJsonTA.value = JSON.stringify(savedPresets, null, 2);
  }
  presetModal.classList.add('on');
});
$('btn-modal-close').addEventListener('click',()=>{ presetModal.classList.remove('on'); });
$('btn-modal-export').addEventListener('click',()=>{
  presetJsonTA.value = configToExportJSON();
  toast('已填入当前参数 JSON');
});

// Import button
$('btn-import').addEventListener('click',()=>{
  try{
    const data = JSON.parse(presetJsonTA.value);
    if(Array.isArray(data)){
      // import first preset from array
      if(data.length===0){ toast('数组为空'); return; }
      Object.assign(CONFIG, data[data.length-1]);
      // also load all into savedPresets
      savedPresets.length=0; savedPresets.push(...data);
      toast('已导入 '+data.length+' 个预设');
    } else {
      Object.assign(CONFIG, data);
      toast('已导入预设 ✓');
    }
    delete CONFIG.savedAt;
    configToDOM();
    updateFullscreenButton();
    invalidatePalette();
    presetModal.classList.remove('on');
    // Must call resize() so that portraitMode + parallaxLayers take effect
    resize();
  } catch(e){
    toast('JSON 解析失败，请检查格式');
  }
});

// Replay entry button
$('btnReplay').addEventListener('click',()=>{
  // Brief flash transition to restart
  $('title').style.opacity=0;
  $('panel').classList.add('hidden');
  $('pill').classList.remove('on');
  $('fullscreen-toggle').classList.remove('on');
  const el=$('flash');
  el.style.opacity='1';
  el.style.transition='opacity 0.3s ease';
  tStart=performance.now();
  mode='scene';
  uiRevealed=false;
  setTimeout(()=>{ el.style.opacity='0'; revealUI(); }, 400);
});

// Panel collapse / pill toggle
$('collapse').addEventListener('click',()=>{
  $('panel').classList.add('hidden');
  $('pill').classList.add('on');
});
$('pill').addEventListener('click',()=>{
  $('pill').classList.remove('on');
  $('panel').classList.remove('hidden');
});

// Fullscreen / portrait toggle
$('fullscreen-toggle').addEventListener('click',()=>{
  CONFIG.portraitMode = !CONFIG.portraitMode;
  updateFullscreenButton();
  resize();
});
updateFullscreenButton();

function updateFullscreenButton(){
  const btn = $('fullscreen-toggle');
  if(btn) btn.textContent = CONFIG.portraitMode ? '◧ 切至全屏' : '◧ 切至竖屏';
}

function toast(msg){
  const el=$('toast'); el.textContent=msg; el.classList.add('on');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('on'),2200);
}

/* ---------- palette / config rebuild ---------- */
function rebuildAll(){
  invalidatePalette();
  renderStatics();
  sprites=[];
  for(let i=0;i<CONFIG.parallaxLayers;i++) sprites[i]=renderLayerSprite(i);
  buildEntry(); buildFog(); buildFlies();
}

/* ---------- resize ---------- */
function resize(){
  DPR=Math.min(2,Math.max(1,window.devicePixelRatio||1));
  const winW=window.innerWidth||document.documentElement.clientWidth||1024;
  const winH=window.innerHeight||document.documentElement.clientHeight||768;

  if(CONFIG.portraitMode){
    // 9:16 phone ratio — constrain canvas to portrait aspect
    const ratio = 9/16;
    if(winW/winH > ratio){
      W = Math.round(winH*ratio);
      H = winH;
    } else {
      W = winW;
      H = Math.round(winW/ratio);
    }
    effectiveW=W; effectiveH=H;
    // Center canvas in window
    cv.style.position='fixed';
    cv.style.left=(winW-W)/2+'px';
    cv.style.top=(winH-H)/2+'px';
    cv.style.width=W+'px';
    cv.style.height=H+'px';
    cv.style.right='auto';
    cv.style.bottom='auto';
    document.body.style.background='#000';
  } else {
    W=winW; H=winH;
    effectiveW=W; effectiveH=H;
    cv.style.position='fixed';
    cv.style.left='0'; cv.style.top='0';
    cv.style.right='0'; cv.style.bottom='0';
    cv.style.width='';
    cv.style.height='';
    document.body.style.background='';
  }

  cv.width=W*DPR; cv.height=H*DPR;
  geo=buildGeometry();
  renderStatics();
  sprites=[];
  for(let i=0;i<CONFIG.parallaxLayers;i++) sprites[i]=renderLayerSprite(i);
  buildEntry(); buildFog(); buildFlies();
  pointer.x=pointer.tx=W/2; pointer.y=pointer.ty=H/2;
}
let rsT; window.addEventListener('resize',()=>{ clearTimeout(rsT); rsT=setTimeout(resize,180); });

/* ---------- boot ---------- */
resize();
// Go straight to scene — skip the dark entry animation
mode='scene';
uiRevealed=true;
// Show UI immediately
setTimeout(()=>{
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('fullscreen-toggle').classList.add('on');
}, 400);
requestAnimationFrame(loop);
</script>
